{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Editar Laboratorio</h2>
    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nombre del Laboratorio:</label>
            <input type="text" name="nombre" class="form-control" value="{{ laboratorio.nombre }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Ubicación:</label>
            <input type="text" name="ubicacion" class="form-control" value="{{ laboratorio.ubicacion }}">
        </div>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="{% url 'laboratorios' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
