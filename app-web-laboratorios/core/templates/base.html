{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema UTT{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .navbar-nav .nav-link { color: #333; font-weight: 500; }
        .navbar-nav .nav-link:hover { color: #198754; }
        .btn-utt { background-color: #198754 !important; color: white !important; border-radius: 20px; border: none; }
        .btn-utt:hover { background-color: #146c43 !important; }
    </style>
</head>
<body class="bg-light">

<header class="navbar navbar-expand-lg navbar-light px-4 shadow-sm bg-white border-bottom border-success border-3">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
            <img src="{% static 'img/Logo UTT.png' %}" alt="Logo UTT" width="100" class="me-2">
            <span class="fw-bold text-success">Sistema de Laboratorios</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <nav class="navbar-nav ms-auto align-items-center gap-3">
                <a href="{% url 'dashboard' %}" class="nav-link">Inicio</a>
                
                {% if rol == 'admin' %}
                    <a href="{% url 'usuarios' %}" class="nav-link">Usuarios</a>
                    <a href="{% url 'laboratorios' %}" class="nav-link">Laboratorios</a>
                {% endif %}
                
                <a href="{% url 'bitacora' %}" class="nav-link">Bitácora</a>
                
                <a href="{% url 'logout' %}" class="btn btn-sm btn-danger px-3 rounded-pill text-white">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                </a>
            </nav>
        </div>
    </div>
</header>

<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert shadow-sm border-0 alert-dismissible fade show" 
                 role="alert"
                 style="background-color: #d1e7dd !important; color: #0f5132 !important; border-left: 5px solid #198754 !important;">
                <i class="bi bi-info-circle-fill me-2"></i>
                <strong>{{ message }}</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<main class="container mt-4">
    {% block content %}{% endblock %}
</main>

<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
