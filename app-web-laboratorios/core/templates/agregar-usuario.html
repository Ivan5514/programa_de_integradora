{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario - UTT</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light">

<header class="navbar navbar-light px-4 shadow-sm bg-white">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'img/Logo UTT.png' %}" alt="Logo UTT" width="200" height="80" class="me-2">
            <span class="fw-bold">Gestión de Usuarios</span>
        </a>
    </div>
</header>

<main class="container mt-5" style="max-width:500px;">
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="card p-4 shadow border-0">
        {% csrf_token %} 
        
        <div class="mb-3">
            <label class="form-label fw-bold">Nombre completo</label>
            <input name="nombre_completo" type="text" class="form-control" placeholder="Ej. Leonardo Flores" required minlength="3">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Correo institucional</label>
            <input name="correo" type="email" class="form-control" placeholder="usuario@utttlaxcala.edu.mx" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Contraseña inicial</label>
            <input name="password" type="password" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Rol del usuario</label>
            <select name="rol" class="form-select">
                <option value="admin">Administrador</option>
                <option value="docente" selected>Docente</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <a href="{% url 'usuarios' %}" class="btn btn-outline-secondary w-50">Cancelar</a>
            <button type="submit" class="btn btn-primary w-50">Guardar Usuario</button>
        </div>
    </form>
</main>

<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
