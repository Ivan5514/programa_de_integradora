{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - UTT</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <style>
        /* Estilo para el fondo degradado del video */
        body {
            background: linear_gradient(135deg, #4e9d6b 0%, #ff8c00 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 400px;">
    <div class="card shadow p-4">
        <div class="text-center mb-4">
            <img src="{% static 'img/Logo UTT.png' %}" alt="Logo UTT" width="150" class="mb-3">
            <h3 class="mt-2 text-secondary">Sistema de Laboratorios</h3>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger p-2 small text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="usuario@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Iniciar Sesión</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{% url 'agregar_usuario' %}" class="small text-decoration-none">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</div>

</body>
</html>
